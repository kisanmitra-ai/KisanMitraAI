<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KisanMitraAI</title>
  <link rel="stylesheet" href="./styles.css?v=home-final-1366x640" />
</head>
<body>
  <main class="site-shell">

    <!-- Exact master image area -->
    <section class="master-stage">
      <img
        class="master-image"
        src="./assets/home-master-reference.png?v=home-final-1366x640"
        alt="KisanMitraAI Homepage Master"
      />

      <!-- Header clickable areas -->
      <a class="hotspot hs-logo" href="#home" aria-label="KisanMitraAI Home"></a>
      <a class="hotspot hs-home" href="#home" aria-label="Home"></a>
      <a class="hotspot hs-farmers" href="#farmers" aria-label="Farmers"></a>
      <a class="hotspot hs-fpo" href="#fpo" aria-label="FPO"></a>
      <a class="hotspot hs-buyer" href="#buyer" aria-label="Buyer"></a>
      <a class="hotspot hs-ai" href="#ai-engine" aria-label="AI Engine"></a>
      <a class="hotspot hs-trust" href="#trust" aria-label="Trust"></a>
      <a class="hotspot hs-contact" href="#contact" aria-label="Contact"></a>
      <a class="hotspot hs-language" href="javascript:void(0)" aria-label="Language"></a>
      <a class="hotspot hs-voice" href="javascript:void(0)" aria-label="Talk to AI"></a>
      <a class="hotspot hs-login" href="./login.html" aria-label="Login"></a>

      <!-- Hero CTA clickable areas -->
      <a class="hotspot hs-farmer-btn" href="#farmers" aria-label="I am a Farmer"></a>
      <a class="hotspot hs-buyer-btn" href="#buyer" aria-label="I am a Buyer"></a>
      <a class="hotspot hs-how-btn" href="#ai-engine" aria-label="See How It Works"></a>
    </section>
<!-- Scroll sections -->

    <section id="farmers" class="page-section">
      <div class="section-inner">
        <h2>Farmers Page</h2>
        <p>Farmers section inside index page</p>
      </div>
    </section>

    <section id="fpo" class="page-section">
      <div class="section-inner">
        <h2>FPO Page</h2>
        <p>FPO section inside index page</p>
      </div>
    </section>

    <section id="buyer" class="page-section">
      <div class="section-inner">
        <h2>Buyer Page</h2>
        <p>Buyer section inside index page</p>
      </div>
    </section>

    <section id="ai-engine" class="page-section">
      <div class="section-inner">
        <h2>AI Engine Page</h2>
        <p>AI Engine section inside index page</p>
      </div>
    </section>

    <section id="trust" class="page-section">
      <div class="section-inner">
        <h2>Trust Page</h2>
        <p>Trust section inside index page</p>
      </div>
    </section>

    <section id="contact" class="page-section">
      <div class="section-inner">
        <h2>Contact Page</h2>
        <p>Contact section inside index page</p>
      </div>
    </section>

  </main>

  <script>
  document.querySelectorAll('a[href^="#"]').forEach(function(link) {
    link.addEventListener("click", function(e) {
      var href = this.getAttribute("href");
      var target = document.querySelector(href);

      if (target) {
        e.preventDefault();
        target.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }
    });
  });
</script>
</body>
</html>
