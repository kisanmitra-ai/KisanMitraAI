<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KisanMitraAI Login</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#eef5ef;
  font-family:Inter,Segoe UI,Arial,sans-serif;
}
.topbar{
  position:fixed;
  top:14px;
  left:32px;
  right:32px;
  height:78px;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 26px;
  background:rgba(255,255,255,.96);
  border-radius:22px;
  box-shadow:0 16px 42px rgba(5,35,14,.16);
}
.logo img{
  height:62px;
  display:block;
}
.nav{
  display:flex;
  align-items:center;
  gap:54px;
  color:#082e14;
  font-size:16px;
  font-weight:800;
}
.nav a{
  color:inherit;
  text-decoration:none;
}
.login-btn{
  height:52px;
  padding:0 28px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#075b18;
  color:#fff;
  font-size:17px;
  font-weight:900;
  text-decoration:none;
}
.screen{
  width:100vw;
  height:100vh;
  background:url("./home-assets/kisanmitraai-login-page-final.png?v=fit-menu-final") center center / cover no-repeat;
}
.click-login{
  position:absolute;
  left:36%;
  top:52%;
  width:28%;
  height:6%;
  z-index:10;
}
.click-signup{
  position:absolute;
  left:36%;
  top:60%;
  width:28%;
  height:6%;
  z-index:10;
}
.click-back{
  position:absolute;
  left:42%;
  top:70%;
  width:16%;
  height:4%;
  z-index:10;
}
@media(max-width:768px){
  .topbar{left:12px;right:12px;height:66px;top:10px}
  .logo img{height:48px}
  .nav{display:none}
  .login-btn{height:44px;padding:0 18px}
}
</style>
</head>
<body>
<header class="topbar">
  <a class="logo" href="./index.html">
    <img src="./kisanmitra-web-ui/assets/kisanmitra-logo-exact.png" alt="KisanMitraAI">
  </a>
  <nav class="nav">
    <a href="./index.html#farmers">Farmers</a>
    <a href="./index.html#fpo">FPO</a>
    <a href="./index.html#buyers">Buyers</a>
    <a href="./index.html#engine">AI Engine</a>
    <a href="./index.html#trust">Trust</a>
    <a href="./index.html#contact">Contact</a>
  </nav>
  <a class="login-btn" href="./login.html">Login</a>
</header>

<main class="screen">
  <a class="click-login" href="#login" aria-label="Login"></a>
  <a class="click-signup" href="./register.html" aria-label="Sign Up"></a>
  <a class="click-back" href="./index.html" aria-label="Back to homepage"></a>
</main>
</body>
</html>
