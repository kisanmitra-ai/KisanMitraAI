<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KisanMitraAI Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f7fff6, #fff8ec);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #173b24;
    }
    .wrap {
      width: 94%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 24px 70px rgba(26, 93, 52, 0.18);
      border: 1px solid rgba(29, 120, 61, 0.12);
    }
    .logo {
      text-align: center;
      margin-bottom: 22px;
    }
    .logo h1 {
      margin: 0;
      font-size: 30px;
      color: #1f7a3a;
    }
    .logo p {
      margin: 8px 0 0;
      color: #68776b;
      font-size: 14px;
    }
    .roles {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 22px 0;
    }
    .role {
      border: 1px solid #dceadd;
      background: #f8fff8;
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
      color: #28623a;
    }
    .role.active {
      background: #1f7a3a;
      color: white;
      border-color: #1f7a3a;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin: 15px 0 7px;
      color: #34513b;
    }
    input {
      width: 100%;
      border: 1px solid #d8e6da;
      border-radius: 16px;
      padding: 15px;
      font-size: 15px;
      outline: none;
      background: #fbfffb;
    }
    input:focus {
      border-color: #1f7a3a;
      box-shadow: 0 0 0 4px rgba(31,122,58,.09);
    }
    .btn {
      width: 100%;
      margin-top: 24px;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #1f7a3a, #f28c28);
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(242,140,40,.25);
    }
    .back {
      display: block;
      margin-top: 20px;
      text-align: center;
      color: #1f7a3a;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .note {
      margin-top: 18px;
      font-size: 12px;
      color: #7a887d;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo">
      <h1>KisanMitraAI</h1>
      <p>Secure access for farmers, FPOs, buyers and administrators</p>
    </div>

    <div class="roles">
      <div class="role active">Farmer</div>
      <div class="role">FPO</div>
      <div class="role">Buyer</div>
      <div class="role">Admin</div>
    </div>

    <form>
      <label>Mobile number or email</label>
      <input type="text" placeholder="Enter mobile number or email" />

      <label>Password or OTP</label>
      <input type="password" placeholder="Enter password or OTP" />

      <button class="btn" type="button">Login</button>
    </form>

    <a class="back" href="./index.html">← Back to homepage</a>

    <div class="note">
      Production login UI ready. Authentication backend will be connected in the next production phase.
    </div>
  </main>

  <script>
    document.querySelectorAll(".role").forEach(role => {
      role.addEventListener("click", () => {
        document.querySelectorAll(".role").forEach(r => r.classList.remove("active"));
        role.classList.add("active");
      });
    });
  </script>
</body>
</html>
