<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KisanMitraAI Login</title>

  <style>
    :root {
      --green: #075b18;
      --orange: #f26522;
      --soft: #eef5ef;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overflow-x: hidden;
      background: #eef5ef;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .locked-header {
      position: fixed;
      top: 7px;
      left: clamp(18px, 2.7vw, 48px);
      right: clamp(18px, 2.7vw, 48px);
      height: clamp(74px, 5.4vw, 104px);
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      padding: 0 clamp(18px, 2.2vw, 34px);
      background: rgba(255,255,255,0.96);
      border-radius: clamp(16px, 1.3vw, 26px);
      box-shadow: 0 18px 44px rgba(5,35,14,0.13);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 250px;
    }

    .brand img {
      height: clamp(58px, 4.6vw, 86px);
      width: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 6px 10px rgba(5,35,14,0.08));
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(26px, 3.6vw, 58px);
      color: #082e14;
      font-size: clamp(14px, 1vw, 18px);
      font-weight: 760;
      white-space: nowrap;
      flex: 1;
    }

    .nav a:hover {
      color: var(--orange);
    }

    .login {
      min-width: clamp(96px, 8.4vw, 138px);
      height: clamp(46px, 3.5vw, 62px);
      border-radius: clamp(12px, .9vw, 18px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(180deg, #157b27, #0b611c);
      color: #fff;
      font-size: clamp(15px, 1.05vw, 19px);
      font-weight: 850;
      box-shadow: 0 12px 26px rgba(7,91,24,0.25);
    }

    .login-icon {
      width: 26px;
      height: 26px;
      border: 2px solid rgba(255,255,255,.95);
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      font-size: 14px;
      line-height: 1;
    }

    .login-page {
  min-height: 100vh;
  padding: 120px 24px 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(rgba(255,255,255,.10), rgba(255,255,255,.14)),
    url("./home-assets/kisanmitraai-login-page-final.png") center center / cover no-repeat;
}

    .wrap {
      width: 94%;
      max-width: 480px;
      background: rgba(255,255,255,0.88);
      border-radius: 30px;
      padding: 34px;
      box-shadow: 0 28px 80px rgba(5,35,14,0.26);
      border: 1px solid rgba(255,255,255,0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .logo {
      text-align: center;
      margin-bottom: 22px;
    }

    .logo h1 {
      margin: 0;
      font-size: 34px;
      color: #075b18;
    }

    .logo p {
      margin: 8px 0 0;
      color: #233727;
      font-size: 15px;
      font-weight: 600;
    }

    .roles {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
      margin: 22px 0;
    }

    .role {
      border: 1px solid #dceadd;
      background: #f8fff8;
      border-radius: 15px;
      padding: 11px 7px;
      text-align: center;
      font-weight: 800;
      cursor: pointer;
      color: #28623a;
      font-size: 13px;
    }

    .role.active {
      background: #075b18;
      color: white;
      border-color: #075b18;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      margin: 15px 0 7px;
      color: #173b24;
    }

    input {
      width: 100%;
      border: 1px solid #d8e6da;
      border-radius: 17px;
      padding: 16px;
      font-size: 15px;
      outline: none;
      background: rgba(255,255,255,0.94);
    }

    input:focus {
      border-color: #075b18;
      box-shadow: 0 0 0 4px rgba(7,91,24,.10);
    }

    .btn {
      width: 100%;
      margin-top: 24px;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      font-size: 17px;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, #075b18, #157b27);
      cursor: pointer;
      box-shadow: 0 14px 32px rgba(7,91,24,.30);
    }

    .signup {
      margin-top: 16px;
      border: 1.5px solid #f26522;
      color: #f26522;
      background: rgba(255,255,255,0.72);
    }

    .back {
      display: block;
      margin-top: 20px;
      text-align: center;
      color: #075b18;
      font-weight: 800;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .locked-header {
        top: 12px;
        left: 12px;
        right: 12px;
        height: 66px;
        padding: 0 14px;
      }

      .brand {
        min-width: 0;
      }

      .brand img {
        height: 50px;
      }

      .nav {
        display: none;
      }

      .login {
        min-width: 86px;
        height: 42px;
        font-size: 14px;
      }

      .login-page {
        padding-top: 100px;
      }

      .roles {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <header class="locked-header">
    <a class="brand" href="./index.html">
      <img src="./kisanmitra-web-ui/assets/kisanmitra-logo-exact.png" alt="KisanMitraAI logo">
    </a>

    <nav class="nav" aria-label="Main menu">
      <a href="./index.html#farmers">Farmers</a>
      <a href="./index.html#fpo">FPO</a>
      <a href="./index.html#buyers">Buyers</a>
      <a href="./index.html#engine">AI Engine</a>
      <a href="./index.html#trust">Trust</a>
      <a href="./index.html#contact">Contact</a>
    </nav>

    <a class="login" href="./login.html">
      <span class="login-icon">◎</span>
      <span>Login</span>
    </a>
  </header>

  <main class="login-page">
    <section class="wrap">
      <div class="logo">
        <h1>Welcome Back</h1>
        <p>Login to continue to KisanMitraAI</p>
      </div>

      <div class="roles">
        <div class="role active">Farmer</div>
        <div class="role">FPO</div>
        <div class="role">Buyer</div>
        <div class="role">Admin</div>
      </div>

      <form>
        <label>Mobile number or email</label>
        <input type="text" placeholder="Enter mobile number or email" />

        <label>Password or OTP</label>
        <input type="password" placeholder="Enter password or OTP" />

        <button class="btn" type="button">Login</button>
        <button class="btn signup" type="button">Sign Up</button>
      </form>

      <a class="back" href="./index.html">← Back to homepage</a>
    </section>
  </main>

  <script>
    document.querySelectorAll(".role").forEach(role => {
      role.addEventListener("click", () => {
        document.querySelectorAll(".role").forEach(r => r.classList.remove("active"));
        role.classList.add("active");
      });
    });
  </script>
</body>
</html>
