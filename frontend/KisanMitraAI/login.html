<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KisanMitraAI Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #ffffff;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    .page-shell {
      width: 100%;
      min-height: 100vh;
      padding: 10px 8px 0;
      background: #ffffff;
    }

    .km-topbar {
      width: min(1280px, calc(100% - 24px));
      min-height: 72px;
      margin: 0 auto;
      padding: 10px 18px 10px 22px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 10px 32px rgba(15, 23, 42, 0.10);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .km-brand {
      display: flex;
      align-items: center;
      text-decoration: none;
      flex: 0 0 auto;
    }

    .km-brand img {
      width: 200px;
      height: 56px;
      object-fit: contain;
      object-position: left center;
      display: block;
    }

    .km-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 38px;
      flex: 1;
      min-width: 0;
    }

    .km-nav a {
      text-decoration: none;
      color: #14351f;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .km-login-btn {
      min-width: 114px;
      height: 46px;
      padding: 0 26px;
      border-radius: 15px;
      background: #0a7a23;
      color: #ffffff !important;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 12px 24px rgba(10, 122, 35, 0.18);
    }

    .km-login-icon {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .km-mobile-header,
    .km-mobile-menu {
      display: none;
    }

    @media (max-width: 1100px) {
      .km-topbar {
        width: calc(100% - 16px);
        padding: 10px 14px 10px 16px;
      }

      .km-brand img {
        width: 170px;
        height: 48px;
      }

      .km-nav {
        gap: 18px;
        overflow-x: auto;
      }

      .km-nav a {
        font-size: 13px;
      }

      .km-login-btn {
        min-width: 92px;
        height: 42px;
        padding: 0 18px;
      }
    }

    @media (max-width: 768px) {
      .km-topbar {
        display: none;
      }

      .km-mobile-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 10px 0;
      }

      .km-menu-btn {
        width: 44px;
        height: 44px;
        border: none;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }

      .km-menu-btn span {
        width: 20px;
        height: 2px;
        border-radius: 999px;
        background: #14351f;
        display: block;
      }

      .km-mobile-logo {
        height: 44px;
        padding: 0 12px;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
        display: flex;
        align-items: center;
      }

      .km-mobile-logo img {
        width: 132px;
        height: 34px;
        object-fit: contain;
        display: block;
      }

      .km-mobile-menu {
        position: fixed;
        top: 62px;
        left: 10px;
        width: 220px;
        z-index: 9999;
        background: rgba(255,255,255,0.98);
        border-radius: 16px;
        box-shadow: 0 14px 36px rgba(15,23,42,0.14);
        padding: 10px;
        display: none;
        flex-direction: column;
        gap: 4px;
      }

      .km-mobile-menu.open {
        display: flex;
      }

      .km-mobile-menu a {
        text-decoration: none;
        color: #14351f;
        font-size: 14px;
        font-weight: 800;
        padding: 10px 12px;
        border-radius: 10px;
      }

      .km-mobile-menu a:last-child {
        background: #0a7a23;
        color: #ffffff;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="km-topbar">
      <a class="km-brand" href="./index.html">
        <img src="./assets/kisanmitra-logo.png" alt="KisanMitraAI" />
      </a>

      <nav class="km-nav">
        <a href="./index.html">Home</a>
        <a href="./farmer-dashboard.html">Farmers</a>
        <a href="./fpo-dashboard.html">FPO</a>
        <a href="./buyer-dashboard.html">Buyer</a>
        <a href="./ai-engine.html">AI Engine</a>
        <a href="./trust.html">Trust</a>
        <a href="./contact.html">Contact</a>
        <a class="km-login-btn" href="./login.html">
          <span class="km-login-icon">O</span>
          Login
        </a>
      </nav>
    </header>

    <header class="km-mobile-header">
      <button class="km-menu-btn" id="kmMenuBtn" type="button" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <a class="km-mobile-logo" href="./index.html">
        <img src="./assets/kisanmitra-logo.png" alt="KisanMitraAI" />
      </a>
    </header>

    <div class="km-mobile-menu" id="kmMobileMenu">
      <a href="./index.html">Home</a>
      <a href="./farmer-dashboard.html">Farmers</a>
      <a href="./fpo-dashboard.html">FPO</a>
      <a href="./buyer-dashboard.html">Buyer</a>
      <a href="./ai-engine.html">AI Engine</a>
      <a href="./trust.html">Trust</a>
      <a href="./contact.html">Contact</a>
      <a href="./login.html">Login</a>
    </div>
  </div>

  <script>
    const kmMenuBtn = document.getElementById("kmMenuBtn");
    const kmMobileMenu = document.getElementById("kmMobileMenu");

    if (kmMenuBtn && kmMobileMenu) {
      kmMenuBtn.addEventListener("click", function () {
        kmMobileMenu.classList.toggle("open");
      });

      document.addEventListener("click", function (e) {
        if (!kmMenuBtn.contains(e.target) && !kmMobileMenu.contains(e.target)) {
          kmMobileMenu.classList.remove("open");
        }
      });
    }
  </script>
</body>
</html>
